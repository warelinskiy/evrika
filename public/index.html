<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evrika Educational Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Cartoon+Fun&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: yellow;
            font-family: 'Cartoon Fun', cursive;
        }
        .navbar {
            background-color: #fff;
            padding: 10px;
        }
        .navbar ul {
            list-style-type: none;
            padding: 0;
        }
        .navbar ul li {
            display: inline;
            margin-right: 20px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0,0,0);
            background-color: rgba(0,0,0,0.4);
            padding-top: 60px;
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
            <li><a href="#" onclick="document.getElementById('registrationModal').style.display='block'">Register</a></li>
        </ul>
    </div>

    <div id="registrationModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="document.getElementById('registrationModal').style.display='none'">&times;</span>
            <h2>Registration</h2>
            <form>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required><br><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>
                <input type="submit" value="Register">
            </form>
        </div>
    </div>

    <script>
        window.onclick = function(event) {
            if (event.target == document.getElementById('registrationModal')) {
                document.getElementById('registrationModal').style.display = "none";
            }
        }
    </script>
</body>
</html>
